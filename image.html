<script>
// Bento grid layout patterns that cycle for each image
const layoutPatterns = [
    { cols: "md:col-span-8", aspect: "aspect-[16/9]" },
    { cols: "md:col-span-4", aspect: "aspect-[3/4]" },
    { cols: "md:col-span-4", aspect: "aspect-square" },
    { cols: "md:col-span-8", aspect: "aspect-[21/9]" },
    { cols: "md:col-span-6", aspect: "aspect-video" },
    { cols: "md:col-span-6", aspect: "aspect-[4/3]" },
    { cols: "md:col-span-12", aspect: "aspect-[21/9]" },
    { cols: "md:col-span-3", aspect: "aspect-square" },
    { cols: "md:col-span-5", aspect: "aspect-[3/4]" },
    { cols: "md:col-span-4", aspect: "aspect-video" },
];

function buildGalleryItem(src, index) {
    const pattern = layoutPatterns[index % layoutPatterns.length];
    const div = document.createElement('div');
    div.className = pattern.cols + ' group relative overflow-hidden bg-surface-container-low ' + pattern.aspect + ' cursor-pointer';
    div.innerHTML =
        '<img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700 ease-in-out scale-105 group-hover:scale-100" src="' + src + '" alt="Photo ' + (index+1) + '"/>' +
        '<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-8 flex flex-col justify-end">' +
            '<span class="font-label text-[10px] text-primary uppercase mb-2">' + String(index+1).padStart(3,'0') + ' / IMG</span>' +
        '</div>' +
        '<div class="absolute top-4 right-4 bg-primary-container text-on-primary px-3 py-1 font-label text-[10px] tracking-widest opacity-0 group-hover:opacity-100 transition-all duration-300">_</div>';
    div.addEventListener('click', function() { openLightbox(src); });
    return div;
}

// Auto-detect images from image/galerie/ directory listing
function loadGallery() {
    fetch('image/galerie/')
    .then(res => res.text())
    .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const links = doc.querySelectorAll('a');
        const imageFiles = [];
        links.forEach(a => {
            const href = a.getAttribute('href');
            if (href && /\.(jpg|jpeg|png|webp|gif|bmp|tiff|heic|heif)$/i.test(href)) {
                imageFiles.push(href);
            }
        });
        imageFiles.sort();
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        imageFiles.forEach((file, i) => {
            grid.appendChild(buildGalleryItem('image/galerie/' + file, i));
        });
        if (imageFiles.length === 0) {
            grid.innerHTML = '<div class="md:col-span-12 py-20 text-center"><span class="font-label text-[10px] text-on-surface/40 uppercase">No images found in image/galerie/</span></div>';
        }
    })
    .catch(err => {
        console.error('Gallery load error:', err);
    });
}

// Lightbox
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
}

document.getElementById('lightbox').addEventListener('click', closeLightbox);
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').classList.contains('active')) {
        if (e.key === 'Escape' || e.key === ' ' || e.key === 'x' || e.key === 'X') {
            e.preventDefault();
            closeLightbox();
        }
    }
});

// Load gallery on page ready
document.addEventListener('DOMContentLoaded', loadGallery);
</script>

<!-- Video / Audio Player Auto Pause JS -->
<script>let activePlayer = null; const players = document.querySelectorAll('audio, video'); players.forEach(player => { player.addEventListener('play', function() { if (activePlayer && activePlayer !== this && !activePlayer.hasAttribute('autoplay')) { activePlayer.pause(); } activePlayer = this; }); });</script>
